<!doctype html>
<html data-theme="light" data-color-scheme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="Wayland" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Wayland" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4E5969" />
    <link rel="icon" type="image/png" href="./pwa/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa/icon-180.png" />
    <!-- UI System v1 typography - Sora display + IBM Plex Mono. SEC-ELEC-02:
         the remote Google Fonts <link>/preconnect were removed to drop the
         first-launch third-party network beacon and keep the renderer CSP at
         font-src 'self'. The --forge-font / --forge-mono-font fallback chains
         (Inter / system-ui / ui-monospace) keep the app fully legible. -->
    <title>Wayland</title>
    <script>
      // Synchronously restore theme from localStorage to prevent theme flash
      (function () {
        try {
          var theme = localStorage.getItem('__wayland_theme');
          var colorScheme = localStorage.getItem('__wayland_colorScheme');
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          }
          if (colorScheme) {
            document.documentElement.setAttribute('data-color-scheme', colorScheme);
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      // Set arco-theme on body synchronously
      try {
        var t = localStorage.getItem('__wayland_theme');
        if (t) document.body.setAttribute('arco-theme', t);
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
    <script>
      // Web-only blank-root recovery (#53). If the shell HTML loads but #root
      // never mounts -- a stale/broken cached bundle, or the service worker
      // having served a bad navigation -- clear the service worker + caches and
      // reload exactly once. Gated on an existing SW registration, which only
      // exists in web/PWA mode (Electron never registers one), so this can
      // never fire on desktop. A sessionStorage one-shot makes a reload loop
      // impossible: a second consecutive blank survives to show the error.
      (function () {
        if (!('serviceWorker' in navigator) || !navigator.serviceWorker) return;
        var KEY = '__wayland_blankRootRecovered';
        setTimeout(function () {
          try {
            var root = document.getElementById('root');
            if (root && root.childElementCount > 0) return;
            if (sessionStorage.getItem(KEY)) return;
            navigator.serviceWorker
              .getRegistrations()
              .then(function (regs) {
                if (!regs || regs.length === 0) return;
                sessionStorage.setItem(KEY, '1');
                return Promise.all(
                  regs.map(function (r) {
                    return r.unregister();
                  })
                )
                  .then(function () {
                    return window.caches ? caches.keys() : [];
                  })
                  .then(function (keys) {
                    return Promise.all(
                      (keys || []).map(function (k) {
                        return caches.delete(k);
                      })
                    );
                  })
                  .catch(function () {})
                  .then(function () {
                    location.reload();
                  });
              })
              .catch(function () {});
          } catch (e) {}
        }, 4000);
      })();
    </script>
  </body>
</html>
