id: fileops-03-rename-file
category: file_ops
prompt: |
  In the provided sandbox directory, rename `old_name.txt` to
  `new_name.txt`. Contents must be preserved exactly; no other
  filesystem changes are permitted.
match_strategy:
  kind: file_tree_matches
  expected_sha256: "c3f8f6a5c4097d0d8f4d5fab33c2f9face5e0a16f3c4d5e6f7a8b9c0d1e2f3a4"
  description: |
    Post-state: new_name.txt exists with original bytes; old_name.txt
    does not exist; no other entries.
rationale: |
  Rename via Bash `mv` rather than Read+Write+Read+delete. Exercises
  the agent's preference for the cheapest correct tool.
allowed_tools:
  - Bash
timeout_secs: 60
