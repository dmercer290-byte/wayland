# Dependency-update automation. This fork no longer tracks upstream, so
# security/version bumps must arrive on their own. CI (fmt, clippy, tests,
# cargo-audit) gates every PR Dependabot opens.
version: 2
updates:
  - package-ecosystem: cargo
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
