name: PR Gate

# Lightweight PR gate for the Wayland fork. Runs on every PR to catch
# what local static gates catch. Complements the heavier `PR Checks`
# workflow (pr-checks.yml), which also runs cross-platform build tests.
#
# Scope: install, typecheck, lint, unit (vitest), build, and the
# security-audit e2e spec. Single runner (ubuntu-latest) to keep PR
# feedback fast. No untrusted PR/issue text is used in run: steps.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, dev, 'feat/**', 'release/**']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'design-mockups/**'
      - '.planning/**'
      - '.blackboard/**'
      - '.vscode/**'
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  checks: write

env:
  # Wayland-core release stream does not exist yet (see commit 48d155826).
  # Skip its prepare step so CI does not try to fetch a non-existent tag.
  WCORE_SKIP: '1'
  CI: 'true'
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  gate:
    name: Gate (ubuntu-latest)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned to ../mise.toml (node = "24"). engines.node allows >=22 <25.
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to ../mise.toml (bun = "1.3").
          bun-version: '1.3'

      - name: Cache Bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: pr-gate-bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            pr-gate-bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Postinstall (CI uses prebuilt binaries; see scripts/postinstall.js)
        run: bun run postinstall || true

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Unit tests (vitest)
        # Node-side specs only; skip benches and packaged-bun integration,
        # which require a packaged app or are long-running.
        run: bunx vitest run

      - name: Build (electron-vite, no packaging)
        run: bunx electron-vite build

      - name: Install Playwright system deps
        run: bunx playwright install --with-deps chromium

      - name: Run security-audit e2e spec
        run: bunx playwright test tests/e2e/specs/security-audit-verification.e2e.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-playwright-report
          path: tests/e2e/report
          if-no-files-found: ignore
          retention-days: 7
