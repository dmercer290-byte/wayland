name: Engine Release (self-hosted)

# Monorepo engine release: builds genesis-core from the wayland-core/ subtree
# on a self-hosted Linux runner and publishes the archive + checksums to THIS
# repo's releases (dmercer290-byte/wayland). No hosted runners / Actions
# billing. The desktop build (scripts/prepareWaylandCore.js) downloads the
# engine from these releases.
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Engine release tag (e.g., v0.12.24-genesis-1)"
        required: true
        type: string
      create_from_sha:
        description: "Commit SHA to create tag_name from if the tag does not exist yet"
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  BINARY_NAME: genesis-core
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x64:
    name: Build engine x86_64-unknown-linux-gnu (self-hosted)
    # Pin to a Linux x64 self-hosted runner: the generic `self-hosted` label
    # also matches the Windows runner (BOLDVISIONS), which cannot build the
    # Linux target. Requires a Linux runner registered on this repo.
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 120
    steps:
      # Check out the requested SHA directly when given (the tag may not exist
      # yet); otherwise check out the tag. The tag is then created via git
      # push using checkout's persisted credentials - the raw refs API was
      # rejecting the POST and curl -f hid the error body (run #2).
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.create_from_sha != '' && inputs.create_from_sha || format('refs/tags/{0}', inputs.tag_name) }}

      - name: Ensure tag exists (git push)
        if: ${{ inputs.create_from_sha != '' && inputs.create_from_sha != null }}
        shell: bash
        env:
          TAG: ${{ inputs.tag_name }}
        run: |
          set -e
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin."
          else
            git tag "${TAG}"
            git push origin "refs/tags/${TAG}"
            echo "Created and pushed tag ${TAG} at $(git rev-parse HEAD)."
          fi

      - name: Install system deps (best-effort)
        shell: bash
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y \
              build-essential pkg-config mold libssl-dev cmake clang protobuf-compiler \
              libdbus-1-dev libseccomp-dev libasound2-dev curl git \
              || echo "::warning::apt install failed or no sudo - the build will surface anything missing"
          fi

      - name: Install Rust (if missing)
        shell: bash
        run: |
          if ! command -v cargo >/dev/null 2>&1 && [ ! -x "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build release binary (from wayland-core/ subtree)
        working-directory: wayland-core
        shell: bash
        run: |
          # wayland-core/.cargo/config.toml forces -fuse-ld=mold; if mold is
          # absent, fall back to the toolchain default linker.
          if ! command -v mold >/dev/null 2>&1; then
            echo "mold not found - overriding to the default linker via RUSTFLAGS"
            export RUSTFLAGS=""
          fi
          cargo build --release --bin ${{ env.BINARY_NAME }}

      - name: Package + checksum
        id: pkg
        working-directory: wayland-core
        shell: bash
        env:
          TAG: ${{ inputs.tag_name }}
        run: |
          set -e
          VERSION="${TAG#v}"
          ARCHIVE="genesis-core-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p dist
          tar -C target/release -czf "dist/${ARCHIVE}" ${{ env.BINARY_NAME }}
          (cd dist && sha256sum genesis-core-* > genesis-core-checksums.txt)
          cat dist/genesis-core-checksums.txt

      - name: Create release + upload assets (to this repo)
        working-directory: wayland-core
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag_name }}
        run: |
          set -e
          # Status-checked API helper: prints the response body on success,
          # prints the HTTP status + error body and fails on >= 400. Never
          # use curl -f here - it swallows the error body (run #2 lesson).
          req() {
            local method=$1 url=$2; shift 2
            local code
            code=$(curl -s -o /tmp/gh-resp.json -w '%{http_code}' -X "$method" \
              -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "$@" "$url")
            if [ "$code" -ge 400 ]; then
              echo "::error::GitHub API $method $url -> HTTP $code" >&2
              cat /tmp/gh-resp.json >&2
              return 1
            fi
            cat /tmp/gh-resp.json
          }
          rid=$(req GET "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" 2>/dev/null \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])" 2>/dev/null || true)
          if [ -z "$rid" ]; then
            rid=$(req POST "https://api.github.com/repos/${{ github.repository }}/releases" \
              -d "{\"tag_name\":\"${TAG}\",\"name\":\"Engine ${TAG}\",\"body\":\"genesis-core engine (Linux x86_64), built from the wayland-core/ subtree on the fork's own runner.\"}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          fi
          echo "Release id: $rid"
          for f in dist/*; do
            name=$(basename "$f")
            aid=$(req GET "https://api.github.com/repos/${{ github.repository }}/releases/${rid}/assets?per_page=100" \
              | python3 -c "import json,sys; print(next((a['id'] for a in json.load(sys.stdin) if a['name']=='$name'), ''))")
            [ -n "$aid" ] && req DELETE "https://api.github.com/repos/${{ github.repository }}/releases/assets/${aid}" >/dev/null || true
            code=$(curl -s -o /tmp/gh-upload.json -w '%{http_code}' \
              -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/octet-stream" \
              --data-binary @"$f" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${rid}/assets?name=${name}")
            if [ "$code" -ge 400 ]; then
              echo "::error::Asset upload ${name} -> HTTP $code"
              cat /tmp/gh-upload.json
              exit 1
            fi
            echo "Uploaded ${name}"
          done
          echo "Engine ${TAG} published to ${{ github.repository }} releases."
